schema_version: "0.1.0"
capsule_id: "gromacs-rmsd"
name: "GROMACS RMSD analysis capsule"
status: "review"
declared_readiness: "R4"
verification_status: "smoke-tested"
scope: "Compute RMSD from a prepared GROMACS structure/run-input file and trajectory."

tool:
  name: "GROMACS"
  upstream_url: "https://www.gromacs.org/"
  version_constraint: "GROMACS package smoke-tested on GitHub Actions Ubuntu; exact package version recorded in workflow artifact"

inputs:
  - name: "structure_or_tpr"
    description: "GROMACS .tpr or compatible structure input. The tiny example uses a synthetic multi-model PDB file."
    format: "tpr/pdb"
    required: true
  - name: "trajectory"
    description: "GROMACS trajectory file. The tiny example uses the same synthetic multi-model PDB file as a trajectory-like input."
    format: "xtc/trr/pdb"
    required: true
  - name: "index_file"
    description: "Optional GROMACS index file."
    format: "ndx"
    required: false

outputs:
  - name: "rmsd_xvg"
    description: "RMSD output in XVG format."
    format: "xvg"
    required: true
  - name: "run_record"
    description: "OpenSciFlow run record JSON."
    format: "json"
    required: true

environment:
  type: ["conda", "apptainer", "local"]
  files:
    - "environment.yml"
    - "apptainer.def"
  hardware:
    cpu: "1+ CPU cores"
    gpu: null
    memory: "2 GB+ for tiny smoke inputs; real trajectories may require more"
    storage: "Enough for trajectory, outputs, and logs"
  runtime_checks:
    - "gmx --version"
    - "test -r {inputs.structure_or_tpr}"
    - "test -r {inputs.trajectory}"
  hpc:
    scheduler: "slurm optional; no site-specific parameters are declared in this skeleton"

command_templates:
  - id: "gromacs-rmsd-basic"
    description: "Compute RMSD using a reviewed GROMACS command template."
    reviewed_status: "reviewed"
    command: "gmx rms -s {inputs.structure_or_tpr} -f {inputs.trajectory} -o {outputs.rmsd_xvg}"
    allowed_placeholders:
      - "{inputs.structure_or_tpr}"
      - "{inputs.trajectory}"
      - "{outputs.rmsd_xvg}"
    expected_outputs:
      - "{outputs.rmsd_xvg}"
    limitations:
      - "Group selection may require interactive input or a reviewed wrapper for non-default groups."
      - "Direct command execution may block on interactive group selection; use the reviewed wrapper for the tiny example."
  - id: "gromacs-rmsd-reviewed-wrapper"
    description: "Run the tiny RMSD example through a reviewed Python wrapper that supplies fixed group selections."
    reviewed_status: "reviewed"
    command: "python scripts/run_gromacs_rmsd.py --structure {inputs.structure_or_tpr} --trajectory {inputs.trajectory} --output {outputs.rmsd_xvg} --run-record {outputs.run_record}"
    allowed_placeholders:
      - "{inputs.structure_or_tpr}"
      - "{inputs.trajectory}"
      - "{outputs.rmsd_xvg}"
      - "{outputs.run_record}"
    expected_outputs:
      - "{outputs.rmsd_xvg}"
      - "{outputs.run_record}"
    limitations:
      - "The wrapper is reviewed only for the tiny synthetic input and fixed group 0 / group 0 selection."
      - "Use on arbitrary trajectories requires additional review."

smoke_tests:
  - id: "gromacs-version-check"
    entrypoint: "smoke-test.sh"
    status: "draft"
    checks:
      - "GROMACS executable is available."
      - "gmx --version exits with status 0."
    expected_runtime_seconds: 10

run_record_requirements:
  - "rendered_command"
  - "gromacs_version"
  - "input_file_hashes"
  - "output_file_hashes"
  - "return_code"
  - "logs"
  - "known_failure_matches"

license:
  capsule_license: "Apache-2.0"
  upstream_license_status: "GROMACS license must be checked from upstream for the exact version used."
  notes: "This capsule does not redistribute GROMACS binaries or sample trajectories."

citation:
  required: true
  text: "Cite GROMACS according to the upstream citation guidance for the version used."
  doi: null
  url: "https://www.gromacs.org/"

limitations:
  - "This is an R4 smoke-tested capsule, not an R5 RMSD example-run capsule."
  - "No example RMSD run record is included yet."
  - "The R4 evidence only verifies that GROMACS can be installed and `gmx --version` can run on GitHub Actions Ubuntu."

name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install jsonschema pyyaml
      - run: python scripts/opensciflow_capsule.py validate verified-capsules/gromacs-rmsd
      - run: python scripts/opensciflow_capsule.py validate verified-capsules/mdanalysis-rmsd
      - run: python scripts/opensciflow_capsule.py summary verified-capsules/gromacs-rmsd
      - run: python scripts/opensciflow_capsule.py summary verified-capsules/mdanalysis-rmsd

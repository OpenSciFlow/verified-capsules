name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e . pytest
      - run: opensciflow-capsule validate verified-capsules/gromacs-rmsd
      - run: opensciflow-capsule validate verified-capsules/mdanalysis-rmsd
      - run: opensciflow-capsule summary verified-capsules/gromacs-rmsd
      - run: opensciflow-capsule summary verified-capsules/mdanalysis-rmsd
      - run: python -m pytest
